services:
  - type: web
    name: housefinance-api
    runtime: python
    plan: free
    region: singapore
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./bachelor_finance.db
      - key: CORS_ORIGINS
        value: https://callince.github.io,https://housefinance.vercel.app
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: onboarding@resend.dev
      - key: VAPID_PRIVATE_KEY_PEM
        sync: false
      - key: VAPID_PUBLIC_KEY
        value: BFj_94ya3ZSHukaY9hVIrKxFsSDEtPzURMFSYnQbCw8ZsqaoNL-alSrE82vcO_TejTUt-tfI0edaV2IuFCBUx0w
      - key: VAPID_EMAIL
        value: mailto:goodsoncallince@gmail.com
